name: CI
run-name: "v0.1.${{ github.run_number }} (${{ github.ref_name }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BASE_VERSION: "0.1"

jobs:
  check-frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run build

  check-rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux: install Tauri system deps
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --all-targets --verbose

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  rust-coverage:
    name: Rust Coverage (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        working-directory: src-tauri
        run: |
          cargo tarpaulin --out Xml --output-dir coverage --timeout 300 --all-targets

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./src-tauri/coverage
          flags: rust-backend
          os: ubuntu-latest
          files: ./src-tauri/coverage/cobertura.xml
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build (${{ matrix.os }})
    needs: [check-frontend, check-rust]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: CI
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux: install Tauri system deps
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing TAURI_SIGNING_PRIVATE_KEY secret."
            exit 1
          fi

          normalized_key="$(printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | tr -d '\r\n\t ')"
          if [[ ${#normalized_key} -lt 120 ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY looks too short. Use the full private key content from ~/.tauri/*.key."
            exit 1
          fi

          # Accept both formats used in practice:
          # 1) single-line encoded key (common in ~/.tauri/*.key)
          # 2) minisign-style key material with comment + encoded line
          if [[ ! "${normalized_key}" =~ ^[A-Za-z0-9+/=]+$ ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY contains unexpected characters. Paste the private key exactly as generated."
            exit 1
          fi

      - name: Set version
        shell: bash
        run: |
          VERSION="${BASE_VERSION}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          rm src-tauri/Cargo.toml.bak

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - \
            src-tauri/target/release/bundle/macos/SproutGit.app

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: SproutGit-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: SproutGit-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: SproutGit-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${BASE_VERSION}.${{ github.run_number }}"
          TAG="v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/Shutter-Share/SproutGit/releases/download/${TAG}"

          find_required_artifact() {
            local artifact_dir="$1"
            local pattern="$2"
            local label="$3"
            local artifact_path

            if [[ ! -d "$artifact_dir" ]]; then
              echo "::error::Missing artifact directory for ${label}: '${artifact_dir}'."
              exit 1
            fi

            artifact_path=$(find "$artifact_dir" -type f -name "$pattern" | head -n 1)

            if [[ -z "$artifact_path" ]]; then
              echo "::error::Missing ${label} artifact. Expected '${pattern}' under '${artifact_dir}'."
              exit 1
            fi

            if [[ ! -f "${artifact_path}.sig" ]]; then
              echo "::error::Missing signature for ${label} artifact: '${artifact_path}.sig'."
              exit 1
            fi

            printf '%s\n' "$artifact_path"
          }

          MACOS_TAR=$(find_required_artifact "artifacts/SproutGit-macos" "*.app.tar.gz" "macOS")
          MACOS_SIG=$(cat "${MACOS_TAR}.sig")
          MACOS_FILENAME=$(basename "$MACOS_TAR")

          LINUX_IMG=$(find_required_artifact "artifacts/SproutGit-linux" "*.AppImage" "Linux")
          LINUX_SIG=$(cat "${LINUX_IMG}.sig")
          LINUX_FILENAME=$(basename "$LINUX_IMG")

          WIN_MSI=$(find_required_artifact "artifacts/SproutGit-windows" "*.msi" "Windows")
          WIN_SIG=$(cat "${WIN_MSI}.sig")
          WIN_FILENAME=$(basename "$WIN_MSI")

          jq -n \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --arg macos_url "${BASE_URL}/${MACOS_FILENAME}" \
            --arg macos_sig "$MACOS_SIG" \
            --arg linux_url "${BASE_URL}/${LINUX_FILENAME}" \
            --arg linux_sig "$LINUX_SIG" \
            --arg win_url "${BASE_URL}/${WIN_FILENAME}" \
            --arg win_sig "$WIN_SIG" \
            '{
              version: $version,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": {url: $macos_url, signature: $macos_sig},
                "linux-x86_64":   {url: $linux_url, signature: $linux_sig},
                "windows-x86_64": {url: $win_url,   signature: $win_sig}
              }
            }' > latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BASE_VERSION }}.${{ github.run_number }}
          name: v${{ env.BASE_VERSION }}.${{ github.run_number }}
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
